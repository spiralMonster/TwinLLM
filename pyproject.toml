[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


#Poe the Poet Configurations:
[tool.poe.tasks]

## Setting up docker infrastructure for MongoDB:

### Creating the Mongodb infrastructure:
local-docker-mongodb-infrastructure-up="docker compose -f configs/docker_configs/mongodb/mongo-compose.yaml up -d"

### Shutting the Mongodb infrastructure:
local-docker-mongodb-infrastructure-down="docker compose -f configs/docker_configs/mongodb/mongo-compose.yaml down"

## Setting up the Zenml Server:
set-local-stack="poetry run zenml stack set default"
local-zenml-server-down="poetry run zenml logout --local"
local-zenml-server-up="poetry run zenml login --local"

start-zenml-local=[
    "local-zenml-server-down",
    "local-zenml-server-up",
     "set-local-stack"
]

## Run Data ETL pipelines:
run-data-etl-user1="poetry run python -m pipelines.run_pipeline --run-etl --no-cache --etl-config-filename data_etl_user1.yaml"
run-data-etl-user2="poetry run python -m pipelines.run_pipeline --run-etl --no-cache --etl-config-filename data_etl_user2.yaml"
run-data-etl-user3="poetry run python -m pipelines.run_pipeline --run-etl --no-cache --etl-config-filename data_etl_user3.yaml"
run-data-etl-user4="poetry run python -m pipelines.run_pipeline --run-etl --no-cache --etl-config-filename data_etl_user4.yaml"

run-data-etl-pipeline=[
    "run-data-etl-user1",
    "run-data-etl-user2",
    "run-data-etl-user3",
    "run-data-etl-user4"
]
